<!doctype html>
<!--
	Bluffers — Database Management Interface

	Entry point for the Bluffers vocabulary database tool.
	The UI is split into three mutually exclusive tab panels (word families,
	words, languages), each rendered on demand by js/main.js.

	Dependencies:
	  - css/style.css  : BEM-based stylesheet
	  - js/main.js     : ES-module entry point (loaded as type="module")
-->
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./css/style.css" />
		<title>Bluffers-bdd</title>
	</head>
	<body>
		<script type="module">
			import { supabase } from "./js/SupabaseManager.js"; // Importez le chemin correct

			async function checkAuth() {
				// On demande à Supabase de récupérer la session actuelle de l'utilisateur
				const {
					data: { session },
				} = await supabase.auth.getSession();

				// S'il n'y a pas de session valide, on le renvoie dehors
				if (!session) {
					window.location.href = "login.html";
				}
			}

			// On exécute la vérification en arrivant sur la page
			checkAuth();
		</script>
		<h1>Bluffers</h1>
		<!--
			Tab navigation bar.
			Each button is wired in main.js to call openTab(), which adds
			"tab-panel--open" to the target panel and removes it from all others,
			ensuring only one panel is visible at a time.
		-->
		<div class="tab">
			<button class="tab__button" id="wordFamilyBtn">Famille de mots</button>
			<button class="tab__button" id="wordBtn">Mots</button>
			<button class="tab__button" id="languagesBtn">Langues</button>
		</div>

		<!-- ═══════════════════════════ Tab Panels ═══════════════════════════ -->
		<!--
			All panels share the "tab-panel" class and are hidden by default.
			Visibility is controlled exclusively via the "tab-panel--open" modifier
			class toggled by openTab() in main.js — no inline styles are used.
		-->

		<div class="tab-panel" id="wordFamilyTab">
			<div class="tab-panel__search-header">
				<input class="tab-panel__search-bar" placeholder="Rechercher" />
				<button type="button" class="tab-panel__search-btn">🔍</button>
			</div>
			<div class="tab-panel__header">
				<button type="button" class="tab-panel__button" id="addFamilyBtn">
					+
				</button>
				<label for="addFamilyBtn" class="tab-panel__label" id="addFamilyLabel"
					>Ajouter une famille</label
				>
				<input
					type="text"
					placeholder="Votre Key"
					class="tab-panel__input"
					id="addFamilyInput"
					name="addFamilyInput"
				/>
				<button
					type="button"
					class="tab-panel__submit-button"
					id="addFamilySubmitBtn"
				>
					Submit
				</button>
				<button type="button" class="tab-panel-order">Trier par V</button>
			</div>
			<div class="tab-panel__header--secondary row">
				<span class="left-group">Nom</span>
				<span>Nb de mot</span>
				<span class="right-group">Date de modif</span>
			</div>
			<div class="tab-panel__content" id="familyTabPanelContent"></div>
		</div>

		<!--
			Words panel.
			Provides an inline add-word form (button → input → submit) and a
			scrollable content area populated by updateWords() in wordTab.js.
			Each rendered word entry is an accordion cloned from #listTemplate.
		-->
		<div class="tab-panel" id="wordTab">
			<div class="tab-panel__search-header">
				<input class="tab-panel__search-bar" placeholder="Rechercher" />
				<button type="button" class="tab-panel__search-btn">🔍</button>
			</div>
			<div class="tab-panel__header">
				<button type="button" class="tab-panel__button" id="addWordButton">
					+
				</button>
				<label for="addWordButton" class="tab-panel__label" id="addWordLabel"
					>Ajouter un mot</label
				>
				<input
					type="text"
					placeholder="Votre Key"
					class="tab-panel__input"
					id="addWordInput"
					name="addWordInput"
				/>
				<button
					type="button"
					class="tab-panel__submit-button"
					id="addWordSubmitBtn"
				>
					Submit
				</button>
				<button type="button" class="tab-panel-order">Trier par V</button>
			</div>
			<div class="tab-panel__header--secondary row">
				<span>Nom</span>
				<span>Date de modif</span>
			</div>
			<!-- Dynamically populated by wordTab.js -->
			<div class="tab-panel__content" id="wordTabPanelContent"></div>
		</div>

		<!--
			Languages panel.
			Same structure as the words panel. Content is populated by
			updateLanguages() in languageTab.js.
			Note: the label is intentionally placed after the submit button in
			the source order; visual positioning is handled by CSS.
		-->
		<div class="tab-panel" id="languageTab">
			<div class="tab-panel__header">
				<button type="button" class="tab-panel__button" id="addLanguageBtn">
					+
				</button>
				<input
					type="text"
					placeholder="Votre Key"
					class="tab-panel__input"
					id="addLanguageInput"
					name="addLanguageInput"
				/>
				<button
					type="button"
					class="tab-panel__submit-button"
					id="addLanguageSubmitBtn"
				>
					Submit
				</button>
				<label
					for="addLanguageBtn"
					class="tab-panel__label"
					id="addLanguageLabel"
					>Ajouter une langue</label
				>
				<button type="button" class="tab-panel-order">Trier par V</button>
			</div>
			<div class="tab-panel__header--secondary row">
				<span>Nom</span>
				<span>Date de modif</span>
			</div>

			<!-- Dynamically populated by languageTab.js -->
			<div class="tab-panel__content" id="languageTabPanelContent"></div>
		</div>

		<!-- ════════════════════════════ Templates ════════════════════════════ -->
		<!--
			<template> elements are inert — their content is not rendered and
			not part of the live DOM until cloned via cloneNode() in JavaScript.
		-->

		<template id="accordion">
			<div class="accordion-item">
				<span class="row-content row">
					<span class="title-group left-group">
						<span class="expand-icon">></span>
						<span class="accordion__button">Family Name</span>
						<span class="edit-group hidden">
							<input type="text" class="edit-input" />
							<span class="validate-btn">✅</span>
						</span>
					</span>
					<span class="word-count">8</span>
					<span class="creation-date right-group">2023/01/01</span>
				</span>
				<div class="accordion__panel">
					<div class="accordion__content"></div>
				</div>
			</div>
		</template>

		<!--
			Reusable add-form template — #addSystemTemplate
			Cloned by createAddSystem() in addSystem.js wherever an inline
			"add" workflow is needed (e.g., adding a translation inside a word
			accordion). After cloning, createAddSystem() assigns a runtime-
			generated unique ID to #addButton so that multiple instances on the
			page do not share the same id, keeping label associations valid.
			Input fields are injected dynamically into .add-panel__inputs.
		-->
		<!--
			Inline add-word form — #accordionAddForm
			Cloned by createAccordionElement() when an onAdd callback is provided.
			Toggled visible by the "+" button on the accordion header.
		-->
		<datalist id="autocomplete-datalist"></datalist>
		<template id="accordionAddForm">
			<span class="accordion__add-form hidden">
				<input
					type="text"
					class="accordion__input"
					list="autocomplete-datalist"
					placeholder="Ajouter un mot..."
				/>
				<span class="accordion__submit">✅</span>
			</span>
		</template>

		<!--
			Language item template — #languageItemTemplate
			Cloned by createLanguageItem() in dom.js to render a language entry
			in the language tab. The name span is populated after cloning.
		-->
		<template id="languageItemTemplate">
			<div class="language-item row">
				<span class="language-item__name"></span>
				<span class="edit-group hidden">
					<input type="text" class="edit-input" />
					<span class="validate-btn">✅</span>
				</span>
				<span class="creation-date">23/12/2023</span>
				<button type="button" class="accordion__add-btn hidden">+</button>
				<button type="button" class="accordion__edit-btn hidden">✏️</button>
			</div>
		</template>

		<!--
			Traduction item template — #traductionItemTemplate
			Cloned by createTraductionItem() in dom.js to render a language+translation
			pair inside a word accordion. Both spans are populated after cloning.
		-->
		<template id="traductionItemTemplate">
			<div class="language-item row">
				<span>
					<span class="language-item__label"></span>
					<span class="language-item__value"></span>
					<span class="edit-group hidden">
						<input type="text" class="edit-input" />
						<span class="validate-btn">✅</span>
					</span>
				</span>

				<button type="button" class="accordion__edit-btn hidden">✏️</button>
			</div>
		</template>

		<template id="addSystemTemplate">
			<div class="add-panel">
				<button type="button" class="add-panel__button" id="addButton">
					+
				</button>
				<label for="addButton" class="add-panel__label"> Ajouter </label>
				<div class="add-panel__inputs"></div>
				<button type="button" class="add-panel__submit-button">
					Confirmer
				</button>
			</div>
		</template>

		<template id="editSystemTemplate">
			<div class="edit-system">
				<button
					type="button"
					class="edit-system__edit-btn"
					aria-label="Modifier"
				>
					✏️
				</button>
				<input type="text" class="edit-system__input" />
				<button type="button" class="edit-system__submit-btn">✓</button>
				<button
					type="button"
					class="edit-system__delete-btn"
					aria-label="Supprimer"
				>
					🗑
				</button>
			</div>
		</template>

		<!--
			Modal backdrop — .document-panel
			A full-viewport transparent overlay. Made visible by toggleModal()
			in modal.js (via "document-panel--visible") at the same time as the
			context menu so that any click outside the menu dismisses it.
			Placing this before .modal in the DOM ensures the modal renders
			on top of the overlay without requiring extra z-index management.
		-->
		<div class="document-panel"></div>

		<!--
			Context menu modal — .modal
			A floating action menu triggered on right-click (or equivalent) of
			an accordion entry. Its position is set in callModal() (modal.js)
			using CSS logical properties (inset-inline-start / inset-block-start)
			so it appears adjacent to the pointer. Event listeners for rename
			and delete are attached and detached dynamically by callModal() /
			toggleModal() to prevent stale handler accumulation across openings.
		-->
		<div class="modal">
			<div class="modal__content">
				<button type="button" class="modal__button" id="modalRenameBtn">
					Renommer
				</button>
				<button type="button" class="modal__button" id="modalDeleteBtn">
					Supprimer
				</button>
			</div>
		</div>

		<div class="modal" id="familyModal">
			<div class="modal__content">
				<button type="button" class="modal__button" id="modalRenameBtn">
					Renommer
				</button>
				<button type="button" class="modal__button" id="modalAddWordBtn">
					Ajouter mot
				</button>
				<button type="button" class="modal__button" id="modalDeleteBtn">
					Supprimer
				</button>
			</div>
		</div>

		<button type="button" class="save-btn" id="saveBtn">Save</button>

		<button type="button" id="publishBtn" class="publish__btn">Publish</button>
		<div id="publishConfirmPopup" class="publish__popup">
			<p>T'es sûr tu veux publier la base de données?</p>
			<button type="button" id="confirmPublishBtn" class="publish__confirm-btn">
				Bah oui, j'suis sûr
			</button>
			<button type="button" id="cancelPublishBtn" class="publish__cancel-btn">
				Euh non, annule
			</button>
		</div>

		<div id="customContextMenuTemplate" class="hidden">
			<div class="custom-context-menu">
				<ul class="custom-context-menu__list"></ul>
			</div>
		</div>

		<template id="customContextItemTemplate">
			<li class="custom-context-menu__item">
				<button class="custom-context-menu__btn">Renommer</button>
			</li>
		</template>

		<script type="module" src="js/main.js"></script>
	</body>
</html>
